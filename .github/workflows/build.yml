name: Build GTA Engine APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK tools
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Compile C++
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          NDK=$ANDROID_HOME/ndk/27.0.12077973
          CLANG=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++
          $CLANG -shared -fPIC \
            -o app/src/main/jniLibs/arm64-v8a/libgta_engine.so \
            app/src/main/cpp/main.cpp \
            -landroid -lEGL -lGLESv3 -llog -std=c++17
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Build APK
        run: bash build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAEngine-APK
          path: build/apk/GTAEngine.apk
