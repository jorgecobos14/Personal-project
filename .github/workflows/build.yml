name: Build GTA Engine APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0"

      - name: Compile C++ with NDK
        run: |
          NDK=$ANDROID_HOME/ndk/27.0.12077973
          CLANG=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++
          SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          $CLANG \
            --sysroot=$SYSROOT \
            -shared -fPIC \
            -o app/src/main/jniLibs/arm64-v8a/libgta_engine.so \
            app/src/main/cpp/main.cpp \
            -landroid -lEGL -lGLESv3 -llog \
            -std=c++17
          echo "SO compilado:"
          ls -lh app/src/main/jniLibs/arm64-v8a/libgta_engine.so

      - name: Build APK
        run: bash build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAEngine-APK
          path: build/apk/GTAEngine.apk
